server:
  host: 127.0.0.1
  port: 8000

spring:
  application:
    name: integration-dashboard
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:qa}
  config:
    import: "optional:configtree:/etc/secrets/fscart-secret/,optional:configtree:/etc/configmap/fishersci-cart-backend-config/"
  datasource:
    hikari:
      connection-timeout: 5000
      minimum-idle: 1
      maximum-pool-size: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      read-only: true

dashboard:
  datasource:
    url: ${DATABASE_URL:}
  local-store: data/scripts.json

cart-preview:
  table: ORDERITEMS
  limit: 10
  read-only: true
  excluded-fields:
    - orders_id
    - orderitems_id
    - accountnumber
    - user_id

---
spring:
  config:
    activate:
      on-profile: local-dev
  datasource:
    url: jdbc:postgresql://db.fscom.dev.database.wr.clouddev.fishersci.net:5432/fscart_db_1?currentSchema=fscart
    username: fscartapp
    password: ${secret.spring.datasource.password}

